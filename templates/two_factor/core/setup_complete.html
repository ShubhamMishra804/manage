{% extends "base.html" %}

{% block title %}2FA Enabled - Finance Advisor{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-6 lg:mt-10 animate-fade-in-up">
    <div class="glass-card rounded-2xl p-8 shadow-xl">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-12 h-12 rounded-2xl bg-olive-50 dark:bg-olive-500/10 flex items-center justify-center">
                <svg class="w-7 h-7 text-olive-600 dark:text-olive-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h2 class="text-2xl font-serif font-bold text-earth-800 dark:text-earth-100">2FA Enabled!</h2>
        </div>
        <p class="text-sm text-earth-500 dark:text-earth-400 mb-6">Congratulations, you've successfully enabled two-factor authentication. Your account is now more secure.</p>
        <a href="{% url 'profile' %}" class="btn-hover inline-block bg-terra-500 hover:bg-terra-400 text-white font-semibold py-2.5 px-8 rounded-xl transition duration-200 shadow-lg shadow-terra-500/15">
            Back to Profile
        </a>
    </div>
</div>
{% endblock %}
